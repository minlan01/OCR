# ============================================================
# ScanStruct 全栈编排（适配 4核8G 服务器）
#
# 首次部署:
#   1. 编辑 .env.production，修改凭据
#   2. docker compose --env-file .env.production up -d --build
#   3. docker compose --env-file .env.production exec api python scripts/init_db.py
#
# 日常使用:
#   docker compose --env-file .env.production up -d        # 启动
#   docker compose --env-file .env.production down          # 停止
#   docker compose --env-file .env.production logs -f       # 查看日志
# ============================================================

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-production}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scanstruct}:${POSTGRES_PASSWORD:-scanstruct123}@postgres:5432/${POSTGRES_DB:-scanstruct}
  DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-scanstruct}:${POSTGRES_PASSWORD:-scanstruct123}@postgres:5432/${POSTGRES_DB:-scanstruct}
  REDIS_URL: redis://:${REDIS_PASSWORD:-scanstruct_redis}@redis:6379/0
  REDIS_BROKER_URL: redis://:${REDIS_PASSWORD:-scanstruct_redis}@redis:6379/1
  REDIS_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-scanstruct_redis}@redis:6379/2
  REDIS_PASSWORD: ${REDIS_PASSWORD:-scanstruct_redis}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
  MINIO_SECURE: "false"
  API_KEY: ${API_KEY:-}
  OCR_ENGINE_TYPE: ${OCR_ENGINE_TYPE:-rapid}
  OCR_USE_GPU: ${OCR_USE_GPU:-false}
  OCR_BATCH_SIZE: ${OCR_BATCH_SIZE:-100}
  OCR_MULTI_ENGINES: ${OCR_MULTI_ENGINES:-["rapid"]}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required — set it in .env.production}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
  DEEPSEEK_TEXT_MODEL: ${DEEPSEEK_TEXT_MODEL:-deepseek-chat}
  DEEPSEEK_FLASH_MODEL: ${DEEPSEEK_FLASH_MODEL:-deepseek-chat}
  DEEPSEEK_TIMEOUT: ${DEEPSEEK_TIMEOUT:-30}
  DEEPSEEK_MAX_CONCURRENT: ${DEEPSEEK_MAX_CONCURRENT:-3}
  BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
  BAILIAN_OCR_BASE_URL: ${BAILIAN_OCR_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  BAILIAN_OCR_MODEL: ${BAILIAN_OCR_MODEL:-qwen-vl-ocr-latest}
  BAILIAN_TEXT_BASE_URL: ${BAILIAN_TEXT_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  BAILIAN_TEXT_MODEL: ${BAILIAN_TEXT_MODEL:-qwen-plus-latest}
  GLM_API_KEY: ${GLM_API_KEY:-}
  GLM_BASE_URL: ${GLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
  GLM_MODEL: ${GLM_MODEL:-glm-4v-flash}
  GLM_TIMEOUT: ${GLM_TIMEOUT:-60}
  GLM_MAX_CONCURRENT: ${GLM_MAX_CONCURRENT:-3}
  BAIDU_OCR_APP_ID: ${BAIDU_OCR_APP_ID:-}
  BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY:-}
  BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY:-}
  BAIDU_OCR_TIMEOUT: ${BAIDU_OCR_TIMEOUT:-30}
  BAIDU_OCR_MAX_CONCURRENT: ${BAIDU_OCR_MAX_CONCURRENT:-5}
  MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-524288000}
  MAX_BATCH_UPLOAD_SIZE: ${MAX_BATCH_UPLOAD_SIZE:-5368709120}
  CELERY_QUEUE_NAME: ${CELERY_QUEUE_NAME:-scanstruct}
  CELERY_TASK_TIMEOUT_SECONDS: ${CELERY_TASK_TIMEOUT_SECONDS:-1800}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-10}
  PREPROCESS_DPI: ${PREPROCESS_DPI:-200}
  PREPROCESS_DESKEW: ${PREPROCESS_DESKEW:-false}
  PREPROCESS_DENOISE: ${PREPROCESS_DENOISE:-false}
  PREPROCESS_BINARY: ${PREPROCESS_BINARY:-false}
  PREPROCESS_CROP_BORDER: ${PREPROCESS_CROP_BORDER:-true}
  SKIP_CLASSIFY: ${SKIP_CLASSIFY:-true}
  MAX_RETRY_COUNT: ${MAX_RETRY_COUNT:-3}
  RETENTION_DAYS: ${RETENTION_DAYS:-30}
  # OCR 临时工作目录：放在磁盘(overlay fs)而非内存型 tmpfs(/tmp)，
  # 避免 500 页大 PDF 拆页时撑满 tmpfs 触发 OOM
  OCR_WORK_DIR: ${OCR_WORK_DIR:-/app/.ocr_work}
  # ── 大 PDF 分片 OCR ──
  OCR_SHARD_THRESHOLD_PAGES: ${OCR_SHARD_THRESHOLD_PAGES:-500}
  OCR_BATCH_PAGE_SIZE: ${OCR_BATCH_PAGE_SIZE:-200}
  OCR_BATCH_MAX_CONCURRENT_PER_MATERIAL: ${OCR_BATCH_MAX_CONCURRENT_PER_MATERIAL:-4}
  OCR_FINALIZE_RETRY_COUNTDOWN: ${OCR_FINALIZE_RETRY_COUNTDOWN:-60}
  OCR_BATCH_MAX_RETRIES: ${OCR_BATCH_MAX_RETRIES:-3}

services:
  postgres:
    image: postgres:15-alpine
    container_name: scanstruct-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanstruct}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanstruct123}
      POSTGRES_DB: ${POSTGRES_DB:-scanstruct}
    # 4核8G 优化：shared_buffers=256MB, 有限连接数
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
      -c wal_buffers=8MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c log_min_duration_statement=-1
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - scanstruct_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanstruct} -d ${POSTGRES_DB:-scanstruct}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scanstruct-net

  redis:
    image: redis:6-alpine
    container_name: scanstruct-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-scanstruct_redis}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --save 300 10
    ports:
      - "${REDIS_HOST_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - scanstruct_redisdata:/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-scanstruct_redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - scanstruct-net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: scanstruct-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_HOST_PORT:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-127.0.0.1:9001}:9001"
    volumes:
      - scanstruct_miniodata:/data
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scanstruct-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scanstruct-api
    image: ${API_IMAGE:-scanstruct-api:latest}
    environment:
      <<: *common-env
      STORAGE_BACKEND: minio
      TEMPLATE_OUTPUT_DIR: ${TEMPLATE_OUTPUT_DIR:-/app/template_output}
      LOG_DIR: /app/logs
    ports:
      - "${API_HOST_PORT:-8900}:8900"
    volumes:
      - scanstruct_templates:/app/template_output
      - ./logs/api:/app/logs
      - scanstruct_ocrwork:/app/.ocr_work:rw
    tmpfs:
      - /tmp:size=512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1000M
        reservations:
          cpus: '0.5'
          memory: 384M
    restart: unless-stopped
    networks:
      - scanstruct-net
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8900/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: scanstruct-worker
    image: ${WORKER_IMAGE:-scanstruct-worker:latest}
    environment:
      <<: *common-env
      STORAGE_BACKEND: minio
      MAX_CONCURRENT_CASES: ${MAX_CONCURRENT_CASES:-3}
      MAX_CONCURRENT_PER_TENANT: ${MAX_CONCURRENT_PER_TENANT:-2}
      BAILIAN_OCR_MAX_CONCURRENT: ${BAILIAN_OCR_MAX_CONCURRENT:-3}
      BAILIAN_TEXT_MAX_CONCURRENT: ${BAILIAN_TEXT_MAX_CONCURRENT:-2}
      LLM_RATE_LIMITER_TEXT: ${LLM_RATE_LIMITER_TEXT:-2}
      LLM_RATE_LIMITER_OCR: ${LLM_RATE_LIMITER_OCR:-3}
      LLM_RATE_LIMITER_FLASH: ${LLM_RATE_LIMITER_FLASH:-5}
      LLM_CONTEXT_MATERIAL_DETAIL_LIMIT: ${LLM_CONTEXT_MATERIAL_DETAIL_LIMIT:-12000}
      LLM_CONTEXT_MATERIAL_NORMAL_LIMIT: ${LLM_CONTEXT_MATERIAL_NORMAL_LIMIT:-5000}
      LLM_CONTEXT_MERGED_LIMIT: ${LLM_CONTEXT_MERGED_LIMIT:-60000}
      LLM_CONTEXT_SLOT_LIMIT: ${LLM_CONTEXT_SLOT_LIMIT:-15000}
      LOG_DIR: /app/logs
      PDF_RENDER_MAX_WORKERS: ${PDF_RENDER_MAX_WORKERS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./logs/worker:/app/logs
      - scanstruct_ocrwork:/app/.ocr_work:rw
    tmpfs:
      - /tmp:size=1G
    # SaaS: 4核8G 优化 — 限制 CPU 和内存
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2500M
        reservations:
          cpus: '1.0'
          memory: 1G
    # memswap_limit 需放在顶层（compose v2 不允许在 deploy.resources.limits 下）
    memswap_limit: 3125M   # memory × 1.25，给 pixmap 尖峰留弹性，超出才 OOM-kill
    restart: unless-stopped
    networks:
      - scanstruct-net
    healthcheck:
      test: ["CMD", "celery", "-A", "worker.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 备用 Worker — 当主 Worker 宕机时自动接管队列，消除单点故障
  # 平时处于等待状态，Celery 的 task_acks_late + task_reject_on_worker_lost 机制
  # 会将未确认的任务重新投递到这个 Worker
  worker-backup:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: scanstruct-worker-backup
    image: ${WORKER_IMAGE:-scanstruct-worker:latest}
    environment:
      <<: *common-env
      STORAGE_BACKEND: minio
      MAX_CONCURRENT_CASES: ${MAX_CONCURRENT_CASES:-3}
      MAX_CONCURRENT_PER_TENANT: ${MAX_CONCURRENT_PER_TENANT:-2}
      BAILIAN_OCR_MAX_CONCURRENT: ${BAILIAN_OCR_MAX_CONCURRENT:-3}
      BAILIAN_TEXT_MAX_CONCURRENT: ${BAILIAN_TEXT_MAX_CONCURRENT:-2}
      LOG_DIR: /app/logs
      PDF_RENDER_MAX_WORKERS: ${PDF_RENDER_MAX_WORKERS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./logs/worker-backup:/app/logs
      - scanstruct_ocrwork:/app/.ocr_work:rw
    tmpfs:
      - /tmp:size=1G
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2000M
        reservations:
          cpus: '0.5'
          memory: 512M
    memswap_limit: 2500M   # memory × 1.25，给 pixmap 尖峰留弹性
    restart: unless-stopped
    networks:
      - scanstruct-net
    healthcheck:
      test: ["CMD", "celery", "-A", "worker.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - ha  # 仅在 docker compose --profile ha up 时启用，默认不启动

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-26-28Z
    container_name: scanstruct-minio-init
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        echo 'Waiting for MinIO...'; sleep 2;
      done;
      mc mb --ignore-existing local/scan-raw;
      mc mb --ignore-existing local/scan-processed;
      mc mb --ignore-existing local/scan-ocr;
      mc mb --ignore-existing local/scan-layout;
      mc mb --ignore-existing local/scan-result;
      echo 'MinIO buckets ready';
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - scanstruct-net

volumes:
  scanstruct_pgdata:
    name: ocrscanstruct_scanstruct_pgdata
    external: true
  scanstruct_redisdata:
    name: ocrscanstruct_scanstruct_redisdata
    external: true
  scanstruct_miniodata:
    name: ocrscanstruct_scanstruct_miniodata
    external: true
  scanstruct_templates:
    name: ocrscanstruct_scanstruct_templates
    external: true
  scanstruct_ocrwork:
    name: ocrscanstruct_scanstruct_ocrwork
    external: true

networks:
  scanstruct-net:
    driver: bridge
    name: scanstruct-net
