# ============================================================
# ScanStruct 全栈编排（适配 4核8G 服务器）
#
# 首次部署:
#   1. 编辑 .env.production，修改凭据
#   2. docker compose --env-file .env.production up -d --build
#   3. docker compose --env-file .env.production exec api python scripts/init_db.py
#
# 日常使用:
#   docker compose --env-file .env.production up -d        # 启动
#   docker compose --env-file .env.production down          # 停止
#   docker compose --env-file .env.production logs -f       # 查看日志
# ============================================================

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-production}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scanstruct}:${POSTGRES_PASSWORD:-scanstruct123}@postgres:5432/${POSTGRES_DB:-scanstruct}
  DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-scanstruct}:${POSTGRES_PASSWORD:-scanstruct123}@postgres:5432/${POSTGRES_DB:-scanstruct}
  REDIS_URL: redis://:${REDIS_PASSWORD:-scanstruct_redis}@redis:6379/0
  REDIS_BROKER_URL: redis://:${REDIS_PASSWORD:-scanstruct_redis}@redis:6379/1
  REDIS_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-scanstruct_redis}@redis:6379/2
  REDIS_PASSWORD: ${REDIS_PASSWORD:-scanstruct_redis}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
  MINIO_SECURE: "false"
  API_KEY: ${API_KEY:-}
  OCR_ENGINE_TYPE: ${OCR_ENGINE_TYPE:-bailian}
  OCR_USE_GPU: ${OCR_USE_GPU:-false}
  OCR_BATCH_SIZE: ${OCR_BATCH_SIZE:-100}
  BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
  BAILIAN_OCR_BASE_URL: ${BAILIAN_OCR_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  BAILIAN_OCR_MODEL: ${BAILIAN_OCR_MODEL:-qwen-vl-ocr-latest}
  BAILIAN_TEXT_BASE_URL: ${BAILIAN_TEXT_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  BAILIAN_TEXT_MODEL: ${BAILIAN_TEXT_MODEL:-qwen-plus-latest}
  MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-524288000}
  MAX_BATCH_UPLOAD_SIZE: ${MAX_BATCH_UPLOAD_SIZE:-5368709120}
  CELERY_QUEUE_NAME: ${CELERY_QUEUE_NAME:-scanstruct}
  CELERY_TASK_TIMEOUT_SECONDS: ${CELERY_TASK_TIMEOUT_SECONDS:-7200}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-10}
  PREPROCESS_DPI: ${PREPROCESS_DPI:-200}
  PREPROCESS_DESKEW: ${PREPROCESS_DESKEW:-false}
  PREPROCESS_DENOISE: ${PREPROCESS_DENOISE:-false}
  PREPROCESS_BINARY: ${PREPROCESS_BINARY:-false}
  PREPROCESS_CROP_BORDER: ${PREPROCESS_CROP_BORDER:-true}
  SKIP_CLASSIFY: ${SKIP_CLASSIFY:-true}
  MAX_RETRY_COUNT: ${MAX_RETRY_COUNT:-3}
  RETENTION_DAYS: ${RETENTION_DAYS:-30}

services:
  postgres:
    image: postgres:15-alpine
    container_name: scanstruct-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanstruct}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanstruct123}
      POSTGRES_DB: ${POSTGRES_DB:-scanstruct}
    # 4核8G 优化：shared_buffers=256MB, 有限连接数
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
      -c wal_buffers=8MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - scanstruct_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanstruct} -d ${POSTGRES_DB:-scanstruct}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scanstruct-net

  redis:
    image: redis:6-alpine
    container_name: scanstruct-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-scanstruct_redis}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --save 300 10
    ports:
      - "${REDIS_HOST_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - scanstruct_redisdata:/data
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-scanstruct_redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - scanstruct-net

  minio:
    image: minio/minio:latest
    container_name: scanstruct-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_HOST_PORT:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-127.0.0.1:9001}:9001"
    volumes:
      - scanstruct_miniodata:/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scanstruct-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scanstruct-api
    image: ${API_IMAGE:-scanstruct-api:latest}
    environment:
      <<: *common-env
      STORAGE_BACKEND: minio
      TEMPLATE_OUTPUT_DIR: ${TEMPLATE_OUTPUT_DIR:-/app/template_output}
    ports:
      - "${API_HOST_PORT:-8900}:8900"
    volumes:
      - scanstruct_templates:/app/template_output
    tmpfs:
      - /tmp:size=512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    networks:
      - scanstruct-net
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8900/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: scanstruct-worker
    image: ${WORKER_IMAGE:-scanstruct-worker:latest}
    environment:
      <<: *common-env
      STORAGE_BACKEND: minio
      BAILIAN_OCR_MAX_CONCURRENT: ${BAILIAN_OCR_MAX_CONCURRENT:-10}
      BAILIAN_TEXT_MAX_CONCURRENT: ${BAILIAN_TEXT_MAX_CONCURRENT:-5}
      LLM_RATE_LIMITER_TEXT: ${LLM_RATE_LIMITER_TEXT:-5}
      LLM_RATE_LIMITER_OCR: ${LLM_RATE_LIMITER_OCR:-10}
      LLM_RATE_LIMITER_FLASH: ${LLM_RATE_LIMITER_FLASH:-15}
      LLM_CONTEXT_MATERIAL_DETAIL_LIMIT: ${LLM_CONTEXT_MATERIAL_DETAIL_LIMIT:-12000}
      LLM_CONTEXT_MATERIAL_NORMAL_LIMIT: ${LLM_CONTEXT_MATERIAL_NORMAL_LIMIT:-5000}
      LLM_CONTEXT_MERGED_LIMIT: ${LLM_CONTEXT_MERGED_LIMIT:-60000}
      LLM_CONTEXT_SLOT_LIMIT: ${LLM_CONTEXT_SLOT_LIMIT:-15000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    tmpfs:
      - /tmp:size=512M
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped
    networks:
      - scanstruct-net
    healthcheck:
      test: ["CMD", "celery", "-A", "worker.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  minio-init:
    image: minio/mc:latest
    container_name: scanstruct-minio-init
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        echo 'Waiting for MinIO...'; sleep 2;
      done;
      mc mb --ignore-existing local/scan-raw;
      mc mb --ignore-existing local/scan-processed;
      mc mb --ignore-existing local/scan-ocr;
      mc mb --ignore-existing local/scan-layout;
      mc mb --ignore-existing local/scan-result;
      echo 'MinIO buckets ready';
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - scanstruct-net

volumes:
  scanstruct_pgdata:
    name: ocrscanstruct_scanstruct_pgdata
    external: true
  scanstruct_redisdata:
    name: ocrscanstruct_scanstruct_redisdata
    external: true
  scanstruct_miniodata:
    name: ocrscanstruct_scanstruct_miniodata
    external: true
  scanstruct_templates:
    name: ocrscanstruct_scanstruct_templates
    external: true

networks:
  scanstruct-net:
    driver: bridge
    name: scanstruct-net
