# ============================================================
# ScanStruct Nginx 反向代理配置
# ============================================================
# 适用场景：通过二级域名访问（如 scanstruct.yourdomain.com）
#
# 安装:
#   sudo cp nginx-scanstruct.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo nginx -s reload
#
# HTTPS 配置:
#   sudo certbot --nginx -d scanstruct.yourdomain.com
# ============================================================

# 上游服务
upstream scanstruct_api {
    server 127.0.0.1:8900;
    keepalive 32;
}

# HTTP → HTTPS 重定向（启用 HTTPS 后取消注释）
# server {
#     listen 80;
#     server_name scanstruct.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

# HTTP 直接访问（先用这个测试，域名来了再加 HTTPS）
server {
    listen 80;
    server_name _;  # 替换为你的二级域名，如 scanstruct.yourdomain.com

    client_max_body_size 600M;  # 匹配 MAX_UPLOAD_SIZE
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # API + 前端
    location / {
        proxy_pass http://scanstruct_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

