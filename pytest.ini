[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端工作流测试
    slow: 耗时较长的测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
